apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: MONGO_URL
          value: "mongodb://mongodb-service.infra.svc.cluster.local:27017/auth"
        - name: PORT
          value: "3000"
        - name: JWT_SECRET
          value: "super_secret_key_123"
        - name: JWT_REFRESH_SECRET
          value: "super_refresh_secret_key_456"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: apps
spec:
  selector:
    app: auth-service
  ports:
  - port: 3000
    targetPort: 3000
